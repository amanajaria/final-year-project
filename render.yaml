services:
  - type: web
    name: college-erp-api
    runtime: python
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt && cd backend && alembic upgrade head
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false
